name: Daily Contest Scrape

on:
  schedule:
    - cron: '0 23 * * *'  # UTC 23:00 = KST 08:00
  workflow_dispatch:        # 수동 실행 가능

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 html5lib

      - name: Run scraper
        run: python export_json.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/contests.json
          git diff --staged --quiet || git commit -m "chore: 공모전 데이터 자동 갱신 $(TZ=Asia/Seoul date +'%Y-%m-%d')"
          git push
