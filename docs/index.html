<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공모전 정보 모아보기</title>
  <style>
    :root {
      --primary: #16a34a;
      --primary-light: #22c55e;
      --bg: #f0fdf4;
      --card-bg: #ffffff;
      --border: #d1fae5;
      --text: #1e293b;
      --muted: #64748b;
      --tag-bg: #dcfce7;
      --tag-color: #15803d;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      color: white;
      padding: 28px 24px 24px;
      box-shadow: 0 4px 20px rgba(22,163,74,0.3);
    }
    header h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px; }
    header p  { margin-top: 4px; font-size: 0.9rem; opacity: 0.85; }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Status bar ── */
    .status-bar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .status-bar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    /* ── Main layout ── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ── Search & Filter ── */
    .filter-bar {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--primary); }

    select {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
      background: white;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { border-color: var(--primary); }

    .btn-search {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-search:hover { background: var(--primary-light); }

    .btn-reset {
      background: white;
      color: var(--muted);
      border: 1.5px solid var(--border);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .btn-reset:hover { border-color: #94a3b8; }

    /* ── Result count ── */
    .result-info {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-info strong { color: var(--primary); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
    }

    .card-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .badge-source {
      background: var(--tag-bg);
      color: var(--tag-color);
    }
    .badge-category {
      background: #fef3c7;
      color: #92400e;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.45;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .card-meta span { display: flex; align-items: center; gap: 5px; }

    .card-link {
      display: block;
      text-align: center;
      background: var(--primary);
      color: white;
      text-decoration: none;
      padding: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: auto;
      transition: background 0.2s;
    }
    .card-link:hover { background: var(--primary-light); }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 40px;
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      background: white;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
    }
    .page-btn:hover { border-color: var(--primary); color: var(--primary); }
    .page-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      font-weight: 700;
    }
    .page-btn.disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Empty / Loading ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      grid-column: 1 / -1;
    }
    .empty .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty h3 { font-size: 1.1rem; margin-bottom: 8px; }

@media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
    <div>
      <h1>🏆 공모전 정보 모아보기</h1>
      <p>콘테스트코리아 &mdash; 매일 오전 8시 자동 갱신 (KST)</p>
    </div>
  </div>
</header>

<div class="status-bar">
  <div class="status-bar-inner">
    <span><span class="status-dot"></span>자동 갱신 활성</span>
    <span id="statusUpdated">로딩 중...</span>
    <span id="statusTotal"></span>
  </div>
</div>

<div class="container">

  <div class="filter-bar">
    <input class="search-input" type="text" id="searchInput" placeholder="공모전 제목, 주최 검색..." />
    <select id="categorySelect">
      <option value="">전체 카테고리</option>
      <option value="디자인">디자인</option>
      <option value="아이디어">아이디어</option>
      <option value="논문">논문</option>
      <option value="사진">사진</option>
      <option value="영상">영상</option>
      <option value="글">글/문학</option>
    </select>
    <button class="btn-search" onclick="applyFilter()">검색</button>
    <button class="btn-reset" onclick="resetFilter()">초기화</button>
  </div>

  <div class="result-info">
    <span id="resultCount"></span>
    <span id="pageInfo"></span>
  </div>

  <div class="grid" id="grid">
    <div class="empty">
      <div class="icon">⏳</div>
      <h3>데이터를 불러오는 중...</h3>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>

</div>

<script>
  const PER_PAGE = 20;
  let allContests = [];
  let filtered = [];
  let currentPage = 1;

  // KST 기준 오늘 날짜
  function todayKST() {
    const now = new Date(Date.now() + 9 * 60 * 60 * 1000);
    return new Date(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
  }

  function isExpired(deadline) {
    if (!deadline) return false;
    const today = todayKST();
    // YYYY.MM.DD 또는 YYYY-MM-DD
    let m = deadline.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
    if (m) {
      return new Date(+m[1], +m[2] - 1, +m[3]) < today;
    }
    // MM.DD
    m = deadline.match(/^(\d{1,2})[.\-\/](\d{2})$/);
    if (m) {
      return new Date(today.getFullYear(), +m[1] - 1, +m[2]) < today;
    }
    return false;
  }

  function loadData() {
    fetch('./data/contests.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        document.getElementById('statusUpdated').textContent = `마지막 갱신: ${data.updated_at} (KST)`;
        allContests = data.contests.filter(c => !isExpired(c.deadline));
        document.getElementById('statusTotal').textContent = `전체 ${allContests.length}건`;
        filtered = allContests;
        currentPage = 1;
        render();
      })
      .catch(() => {
        document.getElementById('statusUpdated').textContent = '데이터를 불러올 수 없습니다.';
        document.getElementById('grid').innerHTML = `
          <div class="empty">
            <div class="icon">⚠️</div>
            <h3>데이터를 불러올 수 없습니다</h3>
            <p>잠시 후 다시 시도해 주세요.</p>
          </div>`;
      });
  }

  loadData();

  function applyFilter() {
    const kw = document.getElementById('searchInput').value.trim().toLowerCase();
    const cat = document.getElementById('categorySelect').value;

    filtered = allContests.filter(c => {
      const matchKw = !kw || (c.title || '').toLowerCase().includes(kw) || (c.host || '').toLowerCase().includes(kw);
      const matchCat = !cat || (c.category || '').includes(cat);
      return matchKw && matchCat;
    });
    currentPage = 1;
    render();
  }

  function resetFilter() {
    document.getElementById('searchInput').value = '';
    document.getElementById('categorySelect').value = '';
    filtered = allContests;
    currentPage = 1;
    render();
  }

  function render() {
    const total = filtered.length;
    const pages = Math.max(1, Math.ceil(total / PER_PAGE));
    if (currentPage > pages) currentPage = pages;

    const start = (currentPage - 1) * PER_PAGE;
    const items = filtered.slice(start, start + PER_PAGE);

    document.getElementById('resultCount').innerHTML = `전체 <strong>${total}</strong>건`;
    document.getElementById('pageInfo').textContent = `${currentPage} / ${pages} 페이지`;

    renderGrid(items);
    renderPagination(pages);
  }

  function renderGrid(items) {
    const grid = document.getElementById('grid');
    if (!items.length) {
      grid.innerHTML = `
        <div class="empty">
          <div class="icon">🔍</div>
          <h3>검색 결과가 없습니다</h3>
          <p>다른 키워드로 검색하거나 전체 목록을 확인해보세요.</p>
        </div>`;
      return;
    }
    grid.innerHTML = items.map(c => `
      <div class="card">
        <div class="card-body">
          <div class="card-badges">
            <span class="badge badge-source">${esc(c.source)}</span>
            ${c.category ? `<span class="badge badge-category">${esc(c.category)}</span>` : ''}
          </div>
          <div class="card-title">${esc(c.title)}</div>
          <div class="card-meta">
            ${c.host     ? `<span>🏢 ${esc(c.host)}</span>` : ''}
            ${c.deadline ? `<span>📅 마감: ${esc(c.deadline)}</span>` : ''}
          </div>
        </div>
        <a class="card-link" href="${esc(c.url)}" target="_blank" rel="noopener">자세히 보기 →</a>
      </div>
    `).join('');
  }

  function renderPagination(pages) {
    const el = document.getElementById('pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }

    const p = currentPage;
    let html = '';

    html += p > 1
      ? `<button class="page-btn" onclick="goPage(${p - 1})">‹ 이전</button>`
      : `<button class="page-btn disabled" disabled>‹ 이전</button>`;

    const from = Math.max(1, p - 3);
    const to   = Math.min(pages, p + 3);
    for (let i = from; i <= to; i++) {
      html += `<button class="page-btn${i === p ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }

    html += p < pages
      ? `<button class="page-btn" onclick="goPage(${p + 1})">다음 ›</button>`
      : `<button class="page-btn disabled" disabled>다음 ›</button>`;

    el.innerHTML = html;
  }

  function goPage(p) {
    currentPage = p;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function esc(s) {
    return (s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyFilter();
  });
</script>

</body>
</html>
