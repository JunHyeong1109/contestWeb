<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공모전 모아보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* 다크 테마 (기본) */
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-dim: #1f3a5f;
      --text: #e6edf3;
      --muted: #8b949e;
      --danger: #f85149;
      --warn: #d29922;
      --safe: #3fb950;
      --radius: 10px;
    }

    /* 라이트 테마 */
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --surface2: #eaeef2;
      --border: #d0d7de;
      --accent: #0969da;
      --accent-dim: #dbeafe;
      --text: #1f2328;
      --muted: #656d76;
      --danger: #cf222e;
      --warn: #9a6700;
      --safe: #1a7f37;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* 헤더 */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .logo-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .header-meta {
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pulse {
      width: 7px; height: 7px;
      background: var(--safe);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* 검색바 */
    .search-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
    }
    .search-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 220px;
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 14px;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box svg { color: var(--muted); flex-shrink: 0; }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.875rem;
      font-family: inherit;
      width: 100%;
      padding: 10px 0;
    }
    .search-box input::placeholder { color: var(--muted); }

    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      padding: 10px 14px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    .btn-search {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-search:hover { opacity: 0.85; }

    .btn-reset {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      padding: 10px 16px;
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-reset:hover { border-color: var(--muted); color: var(--text); }

    /* 메인 컨테이너 */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .result-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .result-bar strong { color: var(--accent); }

    /* 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* 카드 */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
      overflow: hidden;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-thumb {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }
    .card-thumb-placeholder {
      width: 100%;
      height: 180px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--border);
    }

    .card-body {
      padding: 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-source { background: var(--accent-dim); color: var(--accent); }
    .badge-category { background: #2d2008; color: #e3a008; }

    .deadline-chip {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .deadline-urgent { background: #3d0f0f; color: var(--danger); }
    .deadline-soon   { background: #2d1f00; color: var(--warn); }
    .deadline-ok     { background: #0d2a15; color: var(--safe); }

    .card-title {
      font-size: 0.93rem;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-host {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .card-footer {
      border-top: 1px solid var(--border);
    }
    .card-link {
      display: block;
      text-align: center;
      color: var(--muted);
      text-decoration: none;
      padding: 11px;
      font-size: 0.82rem;
      font-weight: 500;
      transition: background 0.2s, color 0.2s;
    }
    .card-link:hover { background: var(--surface2); color: var(--accent); }

    /* 빈 상태 */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 14px; }
    .empty h3 { font-size: 1rem; margin-bottom: 6px; color: var(--text); }
    .empty p  { font-size: 0.85rem; }

    /* 페이지네이션 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 40px;
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 7px 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: inherit;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .page-btn:hover:not(.disabled):not(.active) {
      border-color: var(--accent);
      color: var(--accent);
    }
    .page-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
      font-weight: 700;
    }
    .page-btn.disabled { opacity: 0.3; cursor: not-allowed; }

    /* 푸터 */
    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 0.78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    /* 테마 토글 버튼 */
    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      padding: 6px 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      line-height: 1;
    }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .logo-text { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-text">공모전 모아보기</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="header-meta">
        <span class="pulse"></span>
        <span id="statusUpdated">로딩 중...</span>
        <span style="color:var(--border)">·</span>
        <span id="statusTotal"></span>
      </div>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">다크</button>
    </div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="제목, 주최 검색..." />
    </div>
    <select id="categorySelect" onchange="applyFilter()">
      <option value="">전체 카테고리</option>
      <option value="디자인">디자인</option>
      <option value="아이디어">아이디어</option>
      <option value="논문">논문</option>
      <option value="사진">사진</option>
      <option value="영상">영상</option>
      <option value="글">글/문학</option>
    </select>
    <select id="sortSelect">
      <option value="deadline_asc">마감일 빠른순</option>
      <option value="deadline_desc">마감일 느린순</option>
    </select>
    <button class="btn-search" onclick="applyFilter()">검색</button>
    <button class="btn-reset" onclick="resetFilter()">초기화</button>
  </div>
</div>

<div class="container">
  <div class="result-bar">
    <span id="resultCount"></span>
    <span id="pageInfo"></span>
  </div>

  <div class="grid" id="grid">
    <div class="empty">
      <div class="icon">⏳</div>
      <h3>불러오는 중...</h3>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<footer>
  콘테스트코리아 데이터 · 매일 오전 8시(KST) 자동 갱신
</footer>

<script>
  // 테마 토글
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeBtn').textContent = theme === 'light' ? '라이트' : '다크';
    localStorage.setItem('theme', theme);
  }

  function toggleTheme() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    setTheme(isLight ? 'dark' : 'light');
  }

  (function () {
    setTheme(localStorage.getItem('theme') || 'dark');
  })();

  // 상수·상태
  const PER_PAGE = 20;
  let allContests = [];
  let filtered = [];
  let currentPage = 1;

  // KST 기준 오늘
  function todayKST() {
    const now = new Date(Date.now() + 9 * 60 * 60 * 1000);
    return new Date(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
  }

  // 만료 여부 판별
  function isExpired(deadline) {
    if (!deadline) return false;
    const today = todayKST();
    let m = deadline.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
    if (m) return new Date(+m[1], +m[2] - 1, +m[3]) < today;
    m = deadline.match(/^(\d{1,2})[.\-\/](\d{2})$/);
    if (m) return new Date(today.getFullYear(), +m[1] - 1, +m[2]) < today;
    return false;
  }

  // D-day 계산
  function daysLeft(deadline) {
    if (!deadline) return null;
    const today = todayKST();
    let m = deadline.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
    let d;
    if (m) d = new Date(+m[1], +m[2] - 1, +m[3]);
    else {
      m = deadline.match(/^(\d{1,2})[.\-\/](\d{2})$/);
      if (m) d = new Date(today.getFullYear(), +m[1] - 1, +m[2]);
      else return null;
    }
    return Math.round((d - today) / 86400000);
  }

  // 마감 칩 HTML
  function deadlineChip(deadline) {
    if (!deadline) return '';
    const days = daysLeft(deadline);
    if (days === null) return `<span class="deadline-chip deadline-ok">📅 ${esc(deadline)}</span>`;
    if (days <= 7)  return `<span class="deadline-chip deadline-urgent">D-${days}</span>`;
    if (days <= 30) return `<span class="deadline-chip deadline-soon">D-${days}</span>`;
    return `<span class="deadline-chip deadline-ok">D-${days}</span>`;
  }

  // 데이터 로드
  function loadData() {
    fetch('./data/contests.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        document.getElementById('statusUpdated').textContent = `갱신 ${data.updated_at.slice(0, 10)}`;
        allContests = data.contests.filter(c => !isExpired(c.deadline));
        document.getElementById('statusTotal').textContent = `${allContests.length}건`;
        filtered = allContests;
        currentPage = 1;
        applyFilter();
      })
      .catch(() => {
        document.getElementById('statusUpdated').textContent = '불러오기 실패';
        document.getElementById('grid').innerHTML = `
          <div class="empty">
            <div class="icon">⚠️</div>
            <h3>데이터를 불러올 수 없습니다</h3>
            <p>잠시 후 다시 시도해 주세요.</p>
          </div>`;
      });
  }

  loadData();

  // 마감일 Date 변환
  function deadlineToDate(deadline) {
    if (!deadline) return new Date(9999, 0, 1);
    const today = todayKST();
    let m = deadline.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
    if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
    m = deadline.match(/^(\d{1,2})[.\-\/](\d{2})$/);
    if (m) return new Date(today.getFullYear(), +m[1] - 1, +m[2]);
    return new Date(9999, 0, 1);
  }

  // 필터·정렬 적용
  function applyFilter() {
    const kw = document.getElementById('searchInput').value.trim().toLowerCase();
    const cat = document.getElementById('categorySelect').value;
    const sort = document.getElementById('sortSelect').value;

    filtered = allContests.filter(c => {
      const matchKw = !kw || (c.title||'').toLowerCase().includes(kw) || (c.host||'').toLowerCase().includes(kw);
      const matchCat = !cat || (c.category||'').includes(cat);
      return matchKw && matchCat;
    });

    filtered.sort((a, b) => {
      const da = deadlineToDate(a.deadline);
      const db = deadlineToDate(b.deadline);
      return sort === 'deadline_asc' ? da - db : db - da;
    });

    currentPage = 1;
    render();
  }

  // 필터 초기화
  function resetFilter() {
    document.getElementById('searchInput').value = '';
    document.getElementById('categorySelect').value = '';
    filtered = allContests;
    currentPage = 1;
    render();
  }

  // 목록 렌더링
  function render() {
    const total = filtered.length;
    const pages = Math.max(1, Math.ceil(total / PER_PAGE));
    if (currentPage > pages) currentPage = pages;
    const start = (currentPage - 1) * PER_PAGE;
    const items = filtered.slice(start, start + PER_PAGE);

    document.getElementById('resultCount').innerHTML = `<strong>${total}</strong>개의 공모전`;
    document.getElementById('pageInfo').textContent = `${currentPage} / ${pages} 페이지`;
    renderGrid(items);
    renderPagination(pages);
  }

  // 카드 그리드 렌더링
  function renderGrid(items) {
    const grid = document.getElementById('grid');
    if (!items.length) {
      grid.innerHTML = `
        <div class="empty">
          <div class="icon">🔍</div>
          <h3>검색 결과가 없습니다</h3>
          <p>다른 키워드로 다시 검색해보세요.</p>
        </div>`;
      return;
    }
    grid.innerHTML = items.map(c => `
      <div class="card">
        ${c.thumbnail
          ? `<img class="card-thumb" src="${esc(c.thumbnail)}" alt="${esc(c.title)}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
             <div class="card-thumb-placeholder" style="display:none;">🏆</div>`
          : `<div class="card-thumb-placeholder">🏆</div>`
        }
        <div class="card-body">
          <div class="card-top">
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <span class="badge badge-source">${esc(c.source)}</span>
              ${c.category ? `<span class="badge badge-category">${esc(c.category)}</span>` : ''}
            </div>
            ${deadlineChip(c.deadline)}
          </div>
          <div class="card-title">${esc(c.title)}</div>
          ${c.host ? `<div class="card-host">${esc(c.host)}</div>` : ''}
        </div>
        <div class="card-footer">
          <a class="card-link" href="${esc(c.url)}" target="_blank" rel="noopener">자세히 보기 →</a>
        </div>
      </div>
    `).join('');
  }

  // 페이지네이션 렌더링
  function renderPagination(pages) {
    const el = document.getElementById('pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }
    const p = currentPage;
    let html = p > 1
      ? `<button class="page-btn" onclick="goPage(${p-1})">← 이전</button>`
      : `<button class="page-btn disabled" disabled>← 이전</button>`;
    const from = Math.max(1, p - 3), to = Math.min(pages, p + 3);
    for (let i = from; i <= to; i++)
      html += `<button class="page-btn${i===p?' active':''}" onclick="goPage(${i})">${i}</button>`;
    html += p < pages
      ? `<button class="page-btn" onclick="goPage(${p+1})">다음 →</button>`
      : `<button class="page-btn disabled" disabled>다음 →</button>`;
    el.innerHTML = html;
  }

  // 페이지 이동
  function goPage(p) {
    currentPage = p;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // XSS 이스케이프
  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyFilter();
  });
  document.getElementById('sortSelect').addEventListener('change', applyFilter);
</script>
</body>
</html>
